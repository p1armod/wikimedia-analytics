spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: wikimedia-gateway
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:wikimedia_analytics}
    username: ${POSTGRES_USER:wikimedia}
    password: ${POSTGRES_PASSWORD:wikimedia}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  application:
    name: wikimedia-gateway

server:
  port: ${GATEWAY_PORT:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5176,https://your-project.vercel.app}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.wikimedia.gateway: INFO
    org.apache.kafka: WARN
    org.springframework.web.socket: INFO
